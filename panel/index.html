<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reloj TEA — ¿Cómo estás?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .titulo {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
    }

    .subtitulo {
      font-size: 15px;
      color: #666;
      text-align: center;
      margin-top: -12px;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      min-height: 76px;
      padding: 0 22px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }

    .btn:active { transform: scale(0.96); }

    .emoji { font-size: 40px; line-height: 1; flex-shrink: 0; }

    .nombre { font-size: 21px; font-weight: 600; }

    .btn-rojo    { background: #FCEBEB; }
    .btn-naranja { background: #FAEEDA; }
    .btn-amarillo{ background: #FEFCE8; }
    .btn-azul    { background: #E6F1FB; }
    .btn-verde   { background: #EAF3DE; }

    .nom-rojo    { color: #A32D2D; }
    .nom-naranja { color: #854F0B; }
    .nom-amarillo{ color: #6b5e00; }
    .nom-azul    { color: #185FA5; }
    .nom-verde   { color: #3B6D11; }

    .confirmacion {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      animation: aparecer 0.25s ease;
      width: 100%;
    }

    .confirmacion.visible { display: flex; }

    .conf-emoji { font-size: 80px; line-height: 1; }

    .conf-frase {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.3;
      max-width: 260px;
    }

    .conf-gracias { font-size: 15px; color: #666; }

    .crisis-aviso {
      display: none;
      background: #FCEBEB;
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: #A32D2D;
      width: 100%;
    }

    .crisis-aviso.visible { display: block; }

    .btn-volver {
      margin-top: 8px;
      padding: 10px 28px;
      border: 1.5px solid #ddd;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      font-size: 15px;
      color: #555;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-volver:hover { background: #f5f5f5; }

    @keyframes aparecer {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #111; }
      .titulo { color: #f0f0f0; }
      .subtitulo { color: #999; }
      .btn-rojo    { background: #2a1010; }
      .btn-naranja { background: #261a06; }
      .btn-amarillo{ background: #222106; }
      .btn-azul    { background: #0a1a2e; }
      .btn-verde   { background: #111f08; }
      .nom-rojo    { color: #f09595; }
      .nom-naranja { color: #FAC775; }
      .nom-amarillo{ color: #e8d56a; }
      .nom-azul    { color: #85B7EB; }
      .nom-verde   { color: #97C459; }
      .conf-frase  { color: #f0f0f0; }
      .conf-gracias{ color: #999; }
      .btn-volver  { border-color: #444; color: #aaa; }
      .btn-volver:hover { background: #222; }
      .crisis-aviso { background: #2a1010; color: #f09595; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <p class="titulo" id="titulo">¿Cómo estás ahora?</p>
  <p class="subtitulo" id="subtitulo">Pulsa tu color</p>

  <div class="grid" id="grid">
    <button class="btn btn-rojo"
      onclick="elegir('😱','Agobiado','Estoy aquí contigo','crisis')">
      <span class="emoji">😱</span>
      <span class="nombre nom-rojo">Agobiado</span>
    </button>

    <button class="btn btn-naranja"
      onclick="elegir('😰','Nervioso','Respira despacio. Estás a salvo','normal')">
      <span class="emoji">😰</span>
      <span class="nombre nom-naranja">Nervioso</span>
    </button>

    <button class="btn btn-amarillo"
      onclick="elegir('😭','Triste','Estás triste y eso está bien. No estás solo','normal')">
      <span class="emoji">😭</span>
      <span class="nombre nom-amarillo">Triste</span>
    </button>

    <button class="btn btn-azul"
      onclick="elegir('🥶','Bloqueado','No tienes que hablar. Estoy aquí.','crisis')">
      <span class="emoji">🥶</span>
      <span class="nombre nom-azul">Bloqueado</span>
    </button>

    <button class="btn btn-verde"
      onclick="elegir('🙂','Bien','¡Qué bien! Gracias por decirme','normal')">
      <span class="emoji">🙂</span>
      <span class="nombre nom-verde">Bien</span>
    </button>
  </div>

  <div class="confirmacion" id="confirmacion">
    <div class="conf-emoji" id="c-emoji"></div>
    <div class="crisis-aviso" id="crisis-aviso">
      Respira. Estoy contigo.
    </div>
    <p class="conf-frase" id="c-frase"></p>
    <p class="conf-gracias">Gracias por decirme cómo estás</p>
    <button class="btn-volver" onclick="volver()">Volver</button>
  </div>
</div>

<script>
  function elegir(emoji, nombre, frase, tipo) {
    document.getElementById('grid').style.display = 'none';
    document.getElementById('titulo').style.display = 'none';
    document.getElementById('subtitulo').style.display = 'none';
    document.getElementById('c-emoji').textContent = emoji;
    document.getElementById('c-frase').textContent = frase;
    var aviso = document.getElementById('crisis-aviso');
    if (tipo === 'crisis') {
      aviso.classList.add('visible');
    } else {
      aviso.classList.remove('visible');
    }
    document.getElementById('confirmacion').classList.add('visible');
  }

  function volver() {
    document.getElementById('confirmacion').classList.remove('visible');
    document.getElementById('crisis-aviso').classList.remove('visible');
    document.getElementById('grid').style.display = 'flex';
    document.getElementById('titulo').style.display = 'block';
    document.getElementById('subtitulo').style.display = 'block';
  }
</script>

</body>
</html>
